modLoader="javafml"
loaderVersion="[3,)"
license="GNU GPLv3"
issueTrackerURL="https://github.com/Kishku7/mod_support/issues"
[[mods]]
modId="${id}"
version="${version}"
displayName="${name}"
displayURL="${github}"
logoFile="icon.png"
authors="${author}, pop4959"
description="${description}"
[[mixins]]
config="chunksmith.mixins.json"
[[dependencies.chunky]]
   modId="neoforge"
   type="required"
   versionRange="${neoforgeRange}"
   ordering="NONE"
   side="BOTH"
[[dependencies.chunky]]
   modId="minecraft"
   type="required"
   versionRange="${mcRange}"
   ordering="NONE"
   side="BOTH"

# LOD-streamer conflicts. Each of these ALSO streams LOD data into a client's voxy/Distant Horizons
# database over its own wire, while Chunksmith serves CSLOD over ours. Two writers, one database, no
# coordination: duplicated download, duplicated ingest, and a real risk of racing voxy's DB-local id
# allocation. Ids CONFIRMED from the published jars (docs/lod ecosystem survey, 2026-07-12).
# distanthorizons is deliberately NOT here -- it is a renderer we FEED, not a competitor.
[[dependencies.chunksmith]]
   modId="lss"
   type="incompatible"
   versionRange="[0,)"
   ordering="NONE"
   side="BOTH"
[[dependencies.chunksmith]]
   modId="voxyserver"
   type="incompatible"
   versionRange="[0,)"
   ordering="NONE"
   side="BOTH"
[[dependencies.chunksmith]]
   modId="lodserver"
   type="incompatible"
   versionRange="[0,)"
   ordering="NONE"
   side="BOTH"
